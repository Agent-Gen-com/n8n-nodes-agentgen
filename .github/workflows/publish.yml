name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # trigger on tags like v0.1.4, v1.0.0, etc.

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    # id-token: required for npm provenance (mandatory from May 1 2026)
    # contents: write: required to commit built dist/ back to the repo
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Commit built dist/ to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: update dist for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
